<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learn-Ru-Dee</title>
  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#f7f7f8;
    }
    .embed{
      width:min(960px,96vw);
      height:calc(100vh - 32px);
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      overflow:hidden;
    }
    .vfrc-chat--embedded, .vfrc-chat { height:100%!important; }
    .vfrc-widget-launcher,
    .vfrc-start-new-chat,
    button[data-testid="start-new-chat"]{ display:none!important; }
    .vfrc-header{ display:none!important; }
  </style>
</head>
<body>
  <div id="flat-chat" class="embed"></div>
  <script type="text/javascript">
    (function(d,t){
      var v=d.createElement(t), s=d.getElementsByTagName(t)[0];
      v.onload=function(){
        var uid = localStorage.getItem("vf_user_id");
        if(!uid){
          uid = Math.random().toString(36).slice(2);
          localStorage.setItem("vf_user_id", uid);
