<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learn-Ru-Dee</title>
  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      overflow:hidden;
    }
    .embed{
      width:100vw;
      height:100vh;
      background:#fff;
      overflow:hidden;
    }
    .vfrc-chat--embedded, .vfrc-chat { height:100%!important; }
    .vfrc-widget-launcher,
    .vfrc-start-new-chat,
    button[data-testid="start-new-chat"]{ display:none!important; }
    .vfrc-header{ display:none!important; }
  </style>
</head>
<body>
  <div id="flat-chat" class="embed"></div>
  <script type="text/javascript">
    (function(d,t){
      var v=d.createElement(t), s=d.getElementsByTagName(t)[0];
      v.onload=function(){
        var uid = localStorage.getItem("vf_user_id");
        if(!uid){
          uid = Math.random().toString(36).slice(2);
          localStorage.setItem("vf_user_id", uid);
        }
        window.voiceflow.chat.load({
          verify:{ projectID:"69dc7172a4aebeb37e822dbb" },
          url:"https://general-runtime.voiceflow.com",
          versionID:"production",
          user:{ id: uid },
          render:{ mode:"embedded", target: document.getElementById("flat-chat") },
          autostart:true
        });
      };
      v.src="https://cdn.voiceflow.com/widget-next/bundle.mjs";
      v.type="text/javascript"; s.parentNode.insertBefore(v,s);
    })(document,"script");
  </script>
</body>
</html>
