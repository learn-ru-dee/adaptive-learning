<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learn-Ru-Dee</title>
  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#f7f7f8;
    }
    .embed{
      width:min(1200px,98vw);
      height:calc(100vh - 32px);
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      overflow:hidden;
      margin-left: 16px;
    }
  </style>
</head>
<body>
  <div id="flat-chat" class="embed"></div>
  <script type="text/javascript">
    (function(d,t){
      var v=d.createElement(t), s=d.getElementsByTagName(t)[0];
      v.onload=function(){
        var uid = localStorage.getItem("vf_user_id");
        if(!uid){
          uid = Math.random().toString(36).slice(2);
          localStorage.setItem("vf_user_id", uid);
        }
        window.voiceflow.chat.load({
          verify:{ projectID:"6a0549f0b088a2f0ccb122b3" },
          url:"https://general-runtime.voiceflow.com",
          versionID:"production",
          user:{ id: uid },
          assistant:{
            stylesheet: "https://cdn.jsdelivr.net/gh/learn-ru-dee/adaptive-learning@main/custom.css"
          },
          render:{ mode:"embedded", target: document.getElementById("flat-chat") },
          autostart:true
        });
      };
      v.src="https://cdn.voiceflow.com/widget-next/bundle.mjs";
      v.type="text/javascript"; s.parentNode.insertBefore(v,s);
    })(document,"script");
  </script>
</body>
</html>
